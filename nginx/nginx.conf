# =============================================================================
# nginx.conf — ns-cdn-lab Edge Proxy (CDN + Cache + Security)
# =============================================================================
# ns-cdn-lab sits between Internet clients and a customer origin. It provides:
#
#   1. TLS Termination  — Client connects via HTTPS; edge talks HTTP to origin
#   2. CDN Caching      — Edge stores responses per origin Cache-Control TTL
#   3. Edge Security    — Rate limiting, method filtering, bot blocking (WAF-lite)
#   4. Header Injection — X-Cache-Status for delivery-path troubleshooting
#
# Useful triage questions this config answers:
#   "Is the customer seeing stale content?" → Check X-Cache-Status + TTL
#   "Is the origin down?"                   → BYPASS / 5xx upstream errors
#   "Is this a DDoS?"                       → Rate limit 429s in access logs
# =============================================================================

worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Access log includes cache status for delivery troubleshooting.
    log_format cdn_access '$remote_addr - $remote_user [$time_local] '
                          '"$request" $status $body_bytes_sent '
                          '"$http_referer" "$http_user_agent" '
                          'cache=$upstream_cache_status rt=$request_time';

    access_log /var/log/nginx/access.log cdn_access;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # Hide Nginx version — reduces fingerprinting.
    server_tokens off;

    # -------------------------------------------------------------------------
    # CDN Caching Engine
    # -------------------------------------------------------------------------
    # levels=1:2     → two-tier directory hashing (avoids inode exhaustion)
    # keys_zone      → shared memory for cache keys (metadata)
    # max_size       → disk cache cap (LRU eviction when full)
    # inactive       → drop unused entries after 60 minutes
    # -------------------------------------------------------------------------
    proxy_cache_path /var/cache/nginx
                     levels=1:2
                     keys_zone=cdn_cache:10m
                     max_size=100m
                     inactive=60m
                     use_temp_path=off;

    # -------------------------------------------------------------------------
    # Rate Limiting — basic DDoS / abuse protection
    # -------------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=ddos_protection:10m rate=10r/s;
    limit_req_status 429;

    # -------------------------------------------------------------------------
    # Map upstream_cache_status → X-Cache-Status header
    # -------------------------------------------------------------------------
    map $upstream_cache_status $cache_status_header {
        default   "BYPASS";
        MISS      "MISS";
        HIT       "HIT";
        BYPASS    "BYPASS";
        EXPIRED   "MISS";
        STALE     "HIT";
        UPDATING  "HIT";
        REVALIDATED "HIT";
    }

    # -------------------------------------------------------------------------
    # Block known malicious / scanner User-Agents (simple WAF layer)
    # -------------------------------------------------------------------------
    map $http_user_agent $bad_bot {
        default                 0;
        ""                      1;
        ~*nikto                 1;
        ~*sqlmap                1;
        ~*nmap                  1;
        ~*masscan               1;
        ~*dirbuster             1;
        ~*gobuster              1;
        ~*wpscan                1;
        ~*havij                 1;
        ~*acunetix              1;
        ~*nessus                1;
        ~*openvas               1;
        ~*zgrab                 1;
    }

    # -------------------------------------------------------------------------
    # Allow only GET, HEAD, POST
    # -------------------------------------------------------------------------
    map $request_method $invalid_method {
        default  1;
        GET      0;
        HEAD     0;
        POST     0;
    }

    upstream origin_backend {
        server origin-server:5000;
        keepalive 32;
    }

    # =========================================================================
    # Port 80 — force HTTPS
    # =========================================================================
    server {
        listen 80;
        listen [::]:80;
        server_name ns-cdn-lab.local localhost;

        return 301 https://$host$request_uri;
    }

    # =========================================================================
    # Port 443 — ns-cdn-lab edge (TLS 1.3 + cache + security)
    # =========================================================================
    server {
        # Nginx 1.25+: use separate http2 directive (listen ... http2 is deprecated).
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name ns-cdn-lab.local localhost;

        ssl_certificate     /etc/nginx/certs/edge.crt;
        ssl_certificate_key /etc/nginx/certs/edge.key;

        # TLS 1.3 only — no legacy protocol downgrade.
        ssl_protocols TLSv1.3;

        # IMPORTANT: ssl_ciphers is for TLS ≤1.2 only.
        # TLS 1.3 suites must use ssl_conf_command Ciphersuites (OpenSSL 1.1.1+).
        # Putting TLS_AES_* in ssl_ciphers causes Nginx to crash-loop on OpenSSL 3.
        ssl_conf_command Ciphersuites TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256;
        ssl_prefer_server_ciphers off;

        # Session resumption — fewer full handshakes for returning clients.
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets on;

        if ($bad_bot) {
            return 403;
        }

        if ($invalid_method) {
            return 405;
        }

        location / {
            # Rate-limit customer traffic only (not /edge-health probes).
            limit_req zone=ddos_protection burst=20 nodelay;

            proxy_cache cdn_cache;

            # Omit request method so GET and HEAD share the same cached object.
            proxy_cache_key "$scheme$host$request_uri";

            # Honor origin Cache-Control; proxy_cache_valid is a fallback TTL.
            proxy_cache_valid 200 301 302 60s;
            proxy_cache_valid 404 1m;

            # Prefer availability: serve stale if origin errors.
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_background_update on;
            proxy_cache_lock on;
            proxy_cache_revalidate on;

            # Never cache POST (non-idempotent).
            set $skip_cache 0;
            if ($request_method = POST) {
                set $skip_cache 1;
            }
            proxy_cache_bypass $skip_cache;
            proxy_no_cache $skip_cache;

            proxy_pass http://origin_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Primary delivery-path header for cache troubleshooting.
            add_header X-Cache-Status $cache_status_header always;

            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'self';" always;
            add_header X-Served-By "ns-cdn-lab" always;
        }

        # Readiness / health probes — exempt from rate limiting.
        location = /edge-health {
            access_log off;
            default_type text/plain;
            return 200 "edge-ok\n";
        }
    }
}
