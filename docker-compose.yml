# =============================================================================
# docker-compose.yml — ns-cdn-lab CDN & Edge Security Lab
# =============================================================================
# Architecture:
#
#   [ Internet / Host ] → edge-proxy:443 → [ cdn-network ] → origin-server
#
# Origin is NEVER published to the host. All client traffic must pass through
# the edge proxy — this simulates origin cloaking (backend hidden behind edge).
#
# Usage:
#   1. chmod +x nginx/generate-certs.sh && ./nginx/generate-certs.sh
#   2. docker compose up --build -d
#   3. ./test-suite.sh
# =============================================================================

name: ns-cdn-lab

services:
  # ---------------------------------------------------------------------------
  # origin-server — Customer backend (Flask)
  # ---------------------------------------------------------------------------
  # No host ports: origin cloaking. Only edge-proxy is Internet-facing.
  # ---------------------------------------------------------------------------
  origin-server:
    build:
      context: ./origin
      dockerfile: Dockerfile
    hostname: origin-server
    restart: unless-stopped
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    networks:
      - cdn-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # edge-proxy — Nginx edge (TLS + cache + basic WAF)
  # ---------------------------------------------------------------------------
  # Ports 80/443 are the only entry points. HTTP redirects to HTTPS.
  # ---------------------------------------------------------------------------
  edge-proxy:
    image: nginx:1.27-alpine
    hostname: ns-cdn-lab.local
    restart: unless-stopped
    init: true
    command: >
      sh -c "mkdir -p /var/cache/nginx/client_temp
      /var/cache/nginx/proxy_temp
      /var/cache/nginx/fastcgi_temp
      /var/cache/nginx/uwsgi_temp
      /var/cache/nginx/scgi_temp
      && chown -R nginx:nginx /var/cache/nginx
      && nginx -g 'daemon off;'"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      # Required so Nginx can bind privileged ports 80/443 and drop worker UID/GID.
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
    tmpfs:
      - /var/run
    depends_on:
      origin-server:
        condition: service_healthy
    ports:
      # Bind to localhost only; this is a local lab, not an Internet-facing service.
      - "127.0.0.1:80:80"
      - "127.0.0.1:443:443"
    volumes:
      - ./nginx/certs/edge.crt:/etc/nginx/certs/edge.crt:ro
      - ./nginx/certs/edge.key:/etc/nginx/certs/edge.key:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - edge-cache:/var/cache/nginx
    networks:
      - cdn-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "--no-check-certificate", "https://localhost/edge-health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  cdn-network:
    driver: bridge

volumes:
  edge-cache:
